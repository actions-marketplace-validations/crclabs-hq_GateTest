name: AI CI Fixer

# Triggered after the main CI workflow completes. Runs ONLY when the upstream
# workflow concluded in failure AND the repository variable
# GATETEST_AI_CI_FIXER is set to "1".
#
# Authorization: pre-authorized scaffold (CLAUDE.md FIX-FIRST plan), but
# the recurring Anthropic spend is NOT — that's why the flag exists. Craig
# will flip GATETEST_AI_CI_FIXER on as a repository variable when he's
# ready to pay for it.

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents:       write
  pull-requests:  write
  issues:         write
  actions:        read

jobs:
  ai-fixer:
    name: AI CI Fixer
    runs-on: ubuntu-latest
    # Only run on failed CI runs.
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    env:
      GATETEST_AI_CI_FIXER: ${{ vars.GATETEST_AI_CI_FIXER || '0' }}
    steps:
      - name: Check feature flag
        id: gate
        run: |
          if [ "${GATETEST_AI_CI_FIXER}" != "1" ]; then
            echo "AI CI-fixer disabled (set repository variable GATETEST_AI_CI_FIXER=1 to enable)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout failing branch
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref:         ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # Keep the GITHUB_TOKEN around so `git push` can authenticate.
          persist-credentials: true

      - name: Setup Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Run AI CI-fixer
        if: steps.gate.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID:   ${{ github.event.workflow_run.id }}
          MAX_FIX_ATTEMPTS:  '3'
          CLAUDE_MODEL:      'claude-sonnet-4-5'
        run: node scripts/ai-ci-fixer.js
